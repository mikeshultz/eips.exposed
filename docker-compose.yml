---
version: "3"

services:
  postgres:
    restart: always
    image: postgres:10.0
    environment:
      - POSTGRES_USER=eips
      - POSTGRES_DB=eips
      - POSTGRES_PASSWORD
    ports:
      - "5432:5432"

  eips_processor:
    build:
      context: .
      dockerfile: ./ops/dockerfiles/eips_processor
    depends_on:
      - postgres
    environment:
      - EIPS_DB_URL=postgresql://eips:eips@postgres/eips
      - EIPS_SERVER_PORT=8080
      - EIPS_LOCAL_REPO=/tmp/eips

  eips_graphql:
    build:
      context: .
      dockerfile: ./ops/dockerfiles/eips_api
    depends_on:
      - postgres
    environment:
      - EIPS_DB_URL=postgresql://eips:eips@postgres/eips
      - EIPS_SERVER_PORT=8080
      - EIPS_LOCAL_REPO=/tmp/eips
    ports:
      - "8080:8080"

  eips_frontend:
    build:
      context: .
      dockerfile: ./ops/dockerfiles/eips_frontend
      args:
        GRAPHQL_URL: http://localhost:8080/graphql
    depends_on:
      - eips_graphql
    ports:
      - "3000:3000"

  nginx:
    image: nginx:mainline
    volumes:
      - ./ops/conf/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt # 
      - /var/www/certbot:/var/www/certbot
    # depends_on:
    #   - eips_web
    ports:
      - "80:80"
      - "443:443"
